name: Actualizar EPG

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar EPG
        run: |
          curl -sL --max-time 30 "https://www.tdtchannels.com/epg/TV.xml" -o raw.xml
          if [ ! -s raw.xml ]; then
            curl -sL --max-time 30 "https://www.tdtchannels.com/epg/TV.xml.gz" -o raw.xml.gz
            gunzip -f raw.xml.gz
          fi
          echo "Tamano: $(wc -c < raw.xml) bytes"

      - name: Procesar EPG con Python
        run: python3 parse_epg.py

      - name: Verificar resultado
        run: |
          python3 -c "
          import json
          d = json.load(open('epg.json'))
          print('Canales:', list(d['channels'].keys()))
          print('Total programas:', d['count'])
          "

      - name: Commit EPG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.json
          git diff --staged --quiet && echo "Sin cambios" || (git commit -m "EPG $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
