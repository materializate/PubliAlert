name: Actualizar EPG

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update-epg:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Descargar y procesar EPG
        run: |
          curl -sL "https://www.tdtchannels.com/epg/TV.xml" -o raw.xml || \
          curl -sL "https://www.tdtchannels.com/epg/TV.xml.gz" | gunzip > raw.xml

          python3 << 'PYEOF'
          import xml.etree.ElementTree as ET
          import json, re
          from datetime import datetime, timezone

          TARGET_IDS = {
            'La1.TV','La2.TV','Antena3.TV','Cuatro.TV','Telecinco.TV',
            'LaSexta.TV','DMax.TV','DMAX.TV','Mega.TV','Neox.TV',
            'FactoriadeFiccion.TV','Energy.TV','Divinity.TV','Bemad.TV',
            'La1.es','La2.es','Antena3.es','Cuatro.es','Telecinco.es',
            'LaSexta.es','DMAX.es','Mega.es','Neox.es','FDF.es',
            'Energy.es','Divinity.es','beMad.es',
          }

          with open('raw.xml', 'r', encoding='utf-8', errors='replace') as f:
            raw = f.read()
          raw = re.sub(r'&(?!amp;|lt;|gt;|quot;|apos;|#)', '&amp;', raw)

          root = ET.fromstring(raw)
          result = {}
          count  = 0

          def parse_dt(s):
            s = s.strip()
            ts, tz = s[:14], s[14:].strip()
            dt = datetime(int(ts[0:4]),int(ts[4:6]),int(ts[6:8]),
                          int(ts[8:10]),int(ts[10:12]),int(ts[12:14]))
            sign = -1 if tz and tz[0]=='-' else 1
            h = int(tz[1:3]) if len(tz)>=3 else 0
            m = int(tz[3:5]) if len(tz)>=5 else 0
            offset_s = sign*(h*3600+m*60) if tz else 0
            return int((dt - datetime(1970,1,1)).total_seconds()) - offset_s

          for prog in root.findall('programme'):
            ch = prog.get('channel','')
            if ch not in TARGET_IDS: continue
            start = prog.get('start','')
            stop  = prog.get('stop','')
            el    = prog.find('title')
            title = el.text.strip() if el is not None and el.text else ''
            if not title: continue
            try:
              se, ee = parse_dt(start), parse_dt(stop)
            except: continue
            if ch not in result: result[ch] = []
            result[ch].append({'t':title,'s':se,'e':ee})
            count += 1

          output = {
            'updated': int(datetime.now(timezone.utc).timestamp()),
            'count': count,
            'channels': result
          }
          with open('epg.json','w',encoding='utf-8') as f:
            json.dump(output, f, ensure_ascii=False, separators=(',',':'))

          print(f"OK: {count} programas, {len(result)} canales: {list(result.keys())}")
          PYEOF

      - name: Commit EPG
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add epg.json
          git diff --staged --quiet || git commit -m "EPG $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
